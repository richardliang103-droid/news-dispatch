<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>晨報 · 個人股市新聞</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Noto+Sans+TC:wght@400;500&family=Noto+Serif+TC:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{ /* light (default) — warm paper */
  --bg:#FBFAF6; --surface:#FFFFFF; --hover:#F3F0E9;
  --border:#E7E2D8; --hair:#EEEAE1;
  --ink:#211C16; --muted:#79716A; --dim:#ABA39A;
  --signal:#B8860B; --signal-soft:rgba(184,134,11,.13); --signal-line:rgba(184,134,11,.9);
  --ticker-bg:rgba(29,78,216,.10); --ticker-name:#1D4ED8; --ticker-code:#7C2D12;
  --serif:"Newsreader","Noto Serif TC",Georgia,"Times New Roman",serif;
  --sans:-apple-system,system-ui,"Segoe UI","Noto Sans TC",sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --head-h:64px;
}
html[data-theme="dark"]{ /* warm lamplit dark */
  --bg:#16130E; --surface:#1E1A14; --hover:#25201A;
  --border:#2C261E; --hair:#231E17;
  --ink:#ECE6DC; --muted:#9A9085; --dim:#5F574C;
  --signal:#E3A008; --signal-soft:rgba(227,160,8,.13); --signal-line:rgba(227,160,8,.92);
  --ticker-bg:rgba(96,165,250,.14); --ticker-name:#93C5FD; --ticker-code:#FDBA74;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background .3s,color .3s}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
::selection{background:var(--signal-soft)}
.rail::-webkit-scrollbar,.feed::-webkit-scrollbar{width:11px}
.rail::-webkit-scrollbar-thumb,.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:3px solid var(--bg)}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:256px 1fr;height:100dvh;overflow:hidden}
.rail{border-right:1px solid var(--border);padding:20px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
.feed{overflow-y:auto;position:relative}
.chipbar{display:none}

/* ---------- rail ---------- */
.brand{display:flex;align-items:baseline;gap:8px;padding:0 8px}
.brand .mark{color:var(--signal);font-size:17px;position:relative;top:1px}
.brand .name{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:.01em}
.brand .sub{margin-left:2px;font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim)}
.rail-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:0 8px;margin-bottom:9px}
.watchlist{display:flex;flex-direction:column;gap:1px}
.wl-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px;border-radius:8px;color:var(--muted);transition:background .15s,color .15s}
.wl-item:hover{background:var(--hover)}
.wl-item.active{background:var(--hover);color:var(--ink)}
.wl-item .tk{font-family:var(--mono);font-weight:500;font-size:13px;letter-spacing:.02em;color:var(--ink)}
.wl-item.all .tk{font-family:var(--sans)}
.wl-item .nm{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-item .badge{margin-left:auto;min-width:21px;height:18px;padding:0 6px;border-radius:9px;background:var(--signal-soft);color:var(--signal);font-family:var(--mono);font-size:11px;font-weight:500;display:inline-flex;align-items:center;justify-content:center}
.wl-item .badge.zero{background:transparent;color:var(--dim)}
.date-nav{display:flex;flex-direction:column;gap:1px}
.date{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:8px;color:var(--muted);font-size:13px;transition:background .15s,color .15s}
.date:hover{background:var(--hover)}
.date.active{color:var(--ink)}
.date .when{font-family:var(--mono);font-size:11px;color:var(--dim)}
.rail-foot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.02em}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pulse 2.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,134,11,.4)}70%{box-shadow:0 0 0 6px rgba(184,134,11,0)}100%{box-shadow:0 0 0 0 rgba(184,134,11,0)}}

/* ---------- feed top (sticky head + toolbar) ---------- */
.feed-top{position:sticky;top:0;z-index:6;background:var(--bg);border-bottom:1px solid var(--border)}
.feed-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 22px;height:var(--head-h)}
.h-left{display:flex;align-items:baseline;gap:10px}
.h-left h1{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.01em}
.h-left .date-sub{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.02em}
.icon-btn{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid var(--border);transition:background .15s,color .15s}
.icon-btn:hover{background:var(--hover);color:var(--ink)}
.icon-btn svg{width:16px;height:16px}
.toolbar{display:flex;align-items:center;gap:10px;padding:0 22px 14px;flex-wrap:wrap}
.search{flex:1 1 200px;position:relative;min-width:160px}
.search svg{width:15px;height:15px;position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim)}
.search input{width:100%;padding:8px 12px 8px 32px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--ink);font-size:13px}
.search input::placeholder{color:var(--dim)}
.search input:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-soft)}
.tools{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:2px}
.seg button{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;font-size:12.5px;color:var(--muted);transition:background .15s,color .15s;white-space:nowrap}
.seg button.active{background:var(--hover);color:var(--ink)}
.seg button .cnt{font-family:var(--mono);font-size:10.5px;color:var(--signal)}
.seg button:not(.active) .cnt{color:var(--dim)}
.markall{font-size:12.5px;color:var(--muted);padding:6px 8px;border-radius:8px;transition:background .15s,color .15s;white-space:nowrap}
.markall:hover{background:var(--hover);color:var(--ink)}

/* ---------- category tabs ---------- */
.cat-tabs{display:flex;gap:0;padding:8px 22px 0;border-bottom:1px solid var(--border)}
.cat-tab{padding:8px 18px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;cursor:pointer}
.cat-tab:hover{color:var(--ink)}
.cat-tab.active{color:var(--ink);border-bottom-color:var(--signal)}

/* ---------- skeleton ---------- */
.skeleton{background:linear-gradient(90deg,var(--hair) 25%,var(--border) 50%,var(--hair) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-row{display:flex;align-items:center;gap:12px;padding:16px 22px}
.sk-title{height:20px;flex:1}
.sk-meta{height:14px;width:180px}

/* ---------- groups & rows ---------- */
.groups{padding:10px 14px 70px}
.group{margin-top:16px}
.group-head{display:flex;align-items:baseline;gap:10px;padding:6px 10px 10px}
.group-head .gtk{font-family:var(--mono);font-weight:500;font-size:13px;letter-spacing:.03em;color:var(--ink)}
.group-head .gnm{font-size:12.5px;color:var(--muted)}
.group-head .gline{flex:1;height:1px;align-self:center;background:var(--hair)}
.group-head .gcount{font-family:var(--mono);font-size:11px;color:var(--dim)}
.row{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;padding:13px 12px 13px 16px;border-radius:11px;border-left:2px solid transparent;transition:background .15s,border-color .3s ease}
.row:hover{background:var(--hover)}
.row:focus-visible{outline:2px solid var(--signal);outline-offset:-2px}
.row.unread{border-left-color:var(--signal-line)}
.r-main{flex:1;min-width:0;cursor:pointer}
.row .title{font-family:var(--serif);font-size:17px;line-height:1.42;font-weight:500;color:var(--dim);letter-spacing:.004em;transition:color .3s ease}
.row.unread .title{color:var(--ink);font-weight:600}
.row .meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:6px;font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.01em}
.row.unread .meta{color:var(--muted)}
.row .rtk{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;background:var(--ticker-bg);border:1px solid color-mix(in srgb, var(--ticker-name) 22%, transparent);font-weight:600;letter-spacing:.02em}
.row .rtk .rtk-name{color:var(--ticker-name);font-family:var(--sans);font-weight:700}
.row .rtk .rtk-code{color:var(--ticker-code);font-family:var(--mono);font-weight:600;font-size:10.5px}
.row .meta .sep{opacity:.5}
/* ── topic cluster ── */
.topic-cluster{margin:6px 0 2px;padding:4px 0;border-left:2px solid var(--hair);padding-left:10px}
.topic-cluster .topic-head{display:flex;align-items:baseline;gap:8px;padding:4px 0 6px;font-size:12px;cursor:pointer;user-select:none;border-radius:6px;transition:background .12s}
.topic-cluster .topic-head:hover{background:var(--hover)}
.topic-cluster .topic-head .toggle{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:12px;transition:transform .2s}
.topic-cluster.collapsed .topic-head .toggle{transform:rotate(-90deg)}
.topic-cluster.collapsed > .row,
.topic-cluster.collapsed > .topic-cluster{display:none}
.topic-cluster .topic-label{color:var(--ink);font-weight:500;font-family:var(--sans)}
.topic-cluster .topic-meta{color:var(--dim);font-family:var(--mono);font-size:10.5px;margin-left:auto}
.ticker-cluster{border-left-color:color-mix(in srgb, var(--ticker-name) 35%, var(--hair));padding-left:10px}
.ticker-cluster .topic-head{padding:8px 4px 9px}
.ticker-cluster .topic-label{display:inline-flex;align-items:baseline;gap:5px}
.ticker-cluster .topic-label .rtk-name{color:var(--ticker-name);font-weight:700}
.ticker-cluster .topic-label .rtk-code{color:var(--ticker-code);font-family:var(--mono);font-size:11px}
/* ── chip ── */
.star{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:background .15s,color .15s,transform .15s}
.star:hover{background:var(--hover);color:var(--signal)}
.star svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.3}
.row.starred .star{color:var(--signal)}
.row.starred .star svg{fill:var(--signal);stroke:none}
.star.spin svg{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}

/* ---------- empty ---------- */
.empty{display:none;flex-direction:column;align-items:center;justify-content:center;gap:7px;text-align:center;padding:100px 20px;min-height:340px}
.empty.show{display:flex}
.empty .mk{width:42px;height:42px;border-radius:50%;background:var(--signal-soft);color:var(--signal);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:6px}
.empty .big{font-family:var(--serif);font-size:18px;color:var(--ink)}
.empty .small{font-family:var(--mono);font-size:12px;color:var(--dim)}

/* ---------- err banner ---------- */
.err-banner{display:none;align-items:center;gap:8px;padding:8px 16px;margin:10px 22px;background:#FFF0F0;border:1px solid #FCC;border-radius:9px;font-size:12.5px;color:#C44}
html[data-theme="dark"] .err-banner{background:#2A1010;border-color:#633;color:#F88}
.err-banner.show{display:flex}
.err-banner .retry{font-family:var(--mono);margin-left:auto;color:var(--signal);cursor:pointer;font-size:11px}

/* ---------- mobile ---------- */
@media (max-width:860px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .rail{display:none}
  .chipbar{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg)}
  .chipbar::-webkit-scrollbar{display:none}
  .chip-tk{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;border:1px solid var(--border);color:var(--muted);font-size:13px;white-space:nowrap}
  .chip-tk.active{background:var(--hover);color:var(--ink);border-color:transparent}
  .chip-tk.all{font-family:var(--sans)}
  .chip-tk .tk{font-family:var(--sans);font-weight:600;color:var(--ink)}
  .chip-tk .code{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-left:-2px}
  .chip-tk.all .code{display:none}
  .chip-tk .badge{min-width:18px;height:16px;padding:0 5px;border-radius:8px;background:var(--signal-soft);color:var(--signal);font-family:var(--mono);font-size:10.5px;display:inline-flex;align-items:center;justify-content:center}
  .feed-head{padding:0 16px;height:56px}
  .h-left h1{font-size:19px}
  .toolbar{padding:0 16px 12px}
  .groups{padding:8px 8px 56px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
// ── Supabase 初始化 ──
const SUPABASE_URL = "https://xrlboexuvgegdahfqegg.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_mBWmYim24FPVM2INU6KjKQ_ZbEl2wrn";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── 全域狀態 ──
const state = { ticker:"all", view:"all", sort:"time", search:"", loading:true, error:false, category:"stock" };
let DATA = [];
let TICKERS = [];
let EVENT_MAP = {}; // 語意事件 overlay（從 events.json 載入）

// ── 股票名稱對照表 ──
const TICKER_NAMES = {
  "2881":"富邦金","2882":"國泰金","2884":"玉山金",
  "2886":"兆豐金","2887":"台新新光金","2890":"永豐金","2891":"中信金",
  "2330":"台積電","2454":"聯發科","NVDA":"輝達","AAPL":"蘋果","AMD":"超微",
  "TECH":"科技",
};
const TICKER_PALETTE = [
  {bg:"rgba(37,99,235,.11)", name:"#2563EB", code:"#9A3412"},
  {bg:"rgba(5,150,105,.12)", name:"#047857", code:"#B45309"},
  {bg:"rgba(217,119,6,.13)", name:"#B45309", code:"#1D4ED8"},
  {bg:"rgba(190,24,93,.11)", name:"#BE185D", code:"#047857"},
  {bg:"rgba(14,116,144,.12)", name:"#0E7490", code:"#A16207"},
  {bg:"rgba(124,58,237,.10)", name:"#6D28D9", code:"#0F766E"},
  {bg:"rgba(180,83,9,.12)", name:"#92400E", code:"#1E40AF"},
];
function tickerPalette(ticker){
  const key = String(ticker || "");
  let n = 0;
  for(let i=0;i<key.length;i++) n = (n * 31 + key.charCodeAt(i)) >>> 0;
  return TICKER_PALETTE[n % TICKER_PALETTE.length];
}
function tickerStyle(ticker){
  const p = tickerPalette(ticker);
  return `--ticker-bg:${p.bg};--ticker-name:${p.name};--ticker-code:${p.code}`;
}
function tickerBadge(ticker){
  const name = TICKER_NAMES[ticker] || ticker;
  return `<span class="rtk" style="${tickerStyle(ticker)}"><span class="rtk-name">${esc(name)}</span><span class="rtk-code">${esc(ticker)}</span></span>`;
}

// ── Icon SVGs ──
const ICONS = {
  star:'<svg viewBox="0 0 20 20"><path d="M9.05 2.93c.3-.92 1.6-.92 1.9 0l1.52 4.67a1 1 0 0 0 .95.69h4.91c.97 0 1.37 1.24.59 1.81l-3.98 2.89a1 1 0 0 0-.36 1.12l1.52 4.67c.3.92-.76 1.69-1.54 1.12l-3.98-2.89a1 1 0 0 0-1.18 0l-3.97 2.89c-.79.57-1.84-.2-1.54-1.12l1.52-4.67a1 1 0 0 0-.36-1.12L2.05 10.1c-.78-.57-.38-1.81.59-1.81h4.91a1 1 0 0 0 .95-.69L9.05 2.93Z"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
};

// ── 時間輔助 ──
function fmtTime(ts){
  if(!ts) return "";
  const raw = String(ts);
  const hasClock = /T\d{2}:\d{2}/.test(raw) || /\d{2}:\d{2}:\d{2}/.test(raw);
  const d = new Date(ts);
  if(Number.isNaN(d.getTime())) return "";
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const dm = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const day = dm.getTime() === today.getTime() ? "今日" : (dm.getTime() === yesterday.getTime() ? "昨" : `${d.getMonth()+1}/${d.getDate()}`);
  if(!hasClock) return day;
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${day} ${hh}:${mm}`;
}

// ── 從 Supabase 載入資料 ──
async function fetchNews(){
  state.loading = true;
  state.error = false;
  document.getElementById("errBanner").classList.remove("show");
  renderSkeleton();

  try {
    const srcType = state.category === "tech" ? "tech" : "stock";
    const { data, error } = await supabase
      .from("news")
      .select("*")
      .eq("source_type", srcType)
      .order("published", { ascending: false })
      .limit(200);

    if(error) throw error;

    DATA = (data || []).map(r => ({
      id: r.id,
      ticker: r.ticker,
      title: r.title,
      url: r.url,
      source: r.source || "",
      theme: r.theme || "其他",
      time: fmtTime(r.published),
      ts: r.published ? new Date(r.published).getTime() : 0,
      read: r.read || false,
      starred: r.starred || false,
    }));

    // 用 localStorage 覆蓋 read/starred 狀態（當 Supabase 寫入失敗時的備援）
    applyLocalState();

    // 嘗試載入 events.json（語意事件分類 overlay）
    try {
      const resp = await fetch('events.json?v=' + Date.now());
      if(resp.ok) {
        const events = await resp.json();
        if(events && events.items) {
          EVENT_MAP = events.items;
          for(const r of DATA) {
            const ev = EVENT_MAP[r.id] || EVENT_MAP[r.url] || null;
            if(ev) {
              r.event_key = ev.event_key;
              r.event_label = ev.event_label;
              r.event_confidence = ev.confidence || 0;
            }
          }
        }
      }
    } catch(e) {
      // events.json 載入失敗不可中斷頁面
      console.warn('events.json 載入失敗，使用 deterministic fallback', e);
    }

    // 從資料中提取 ticker 列表（按出現順序，去重）
    const seen = new Set();
    TICKERS = [];
    for(const r of DATA){
      if(!seen.has(r.ticker)){
        seen.add(r.ticker);
        TICKERS.push({ ticker: r.ticker, name: TICKER_NAMES[r.ticker] || r.ticker });
      }
    }

    // 更新時間
    const now = new Date();
    document.getElementById("update-time").textContent =
      `更新於 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById("date-sub").textContent =
      `${now.getMonth()+1}/${now.getDate()} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
    document.getElementById("date-when").textContent =
      `${now.getMonth()+1}/${now.getDate()} ${['日','一','二','三','四','五','六'][now.getDay()]}`;

    state.loading = false;
    renderAll();
  } catch(e){
    console.error("Supabase fetch error:", e);
    state.loading = false;
    state.error = true;
    document.getElementById("errBanner").classList.add("show");
    document.getElementById("groups").innerHTML = "";
    showEmpty("⚠", "載入新聞失敗", "請檢查網路後點擊重試");
  }
}

// ── 輔助函數 ──
const nameOf = t => (TICKERS.find(x=>x.ticker===t)||{}).name || t;
const unreadOf = t => DATA.filter(d=>d.ticker===t && !d.read).length;
const totalUnread = () => DATA.filter(d=>!d.read).length;
const totalStar = () => DATA.filter(d=>d.starred).length;

// ── localStorage 本地持久化（Supabase 寫入失敗時的備援） ──
const LS_READ = "ns-read-ids";
const LS_STAR = "ns-star-ids";
function storedIdSet(key){
  try { return new Set((JSON.parse(localStorage.getItem(key) || "[]") || []).map(String)); }
  catch(e){ return new Set(); }
}
function writeIdSet(key, ids){
  try { localStorage.setItem(key, JSON.stringify([...ids])); } catch(e){}
}
function persistReadState(){
  const ids = storedIdSet(LS_READ);
  for(const d of DATA){
    const k = String(d.id);
    if(d.read) ids.add(k); else ids.delete(k);
  }
  writeIdSet(LS_READ, ids);
}
function persistStarredState(){
  const ids = storedIdSet(LS_STAR);
  for(const d of DATA){
    const k = String(d.id);
    if(d.starred) ids.add(k); else ids.delete(k);
  }
  writeIdSet(LS_STAR, ids);
}
function applyLocalState(){
  const readIds = storedIdSet(LS_READ);
  const starIds = storedIdSet(LS_STAR);
  DATA.forEach(d=>{
    const k = String(d.id);
    if(readIds.has(k)) d.read = true;
    if(starIds.has(k)) d.starred = true;
  });
}

function matches(r){
  if(state.ticker!=="all" && r.ticker!==state.ticker) return false;
  if(state.view==="unread"  && r.read)     return false;
  if(state.view==="starred" && !r.starred) return false;
  if(state.search){
    const hay = (r.title+" "+r.source+" "+r.ticker+" "+r.theme).toLowerCase();
    if(!hay.includes(state.search)) return false;
  }
  return true;
}

// ── 主題分組（按 theme 欄位，取代原本的 bigram 聚類） ──
function groupByTheme(articles){
  const byTheme = {};
  for(const a of articles){
    const th = a.theme || "其他";
    if(!byTheme[th]) byTheme[th] = [];
    byTheme[th].push(a);
  }
  const result = [];
  for(const [theme, rows] of Object.entries(byTheme)){
    // 列出這個主題涉及的所有 ticker 名稱
    const tickers = [...new Set(rows.map(r=>r.ticker))];
    const tickerLabels = tickers.map(t => TICKER_NAMES[t] || t).join("、");
    result.push({topic: theme, rows, tickerString: tickerLabels});
  }
  // 按新聞數量降序排列（量大的主題在前）
  result.sort((a,b) => b.rows.length - a.rows.length);
  return result;
}
// ── 事件分群 ──
const EVENT_DICT = {
  "衝突":     { words: ["肢體衝突","互毆","痛毆","毆打","打人","徒手攻擊","攻擊","爆爭執","爭執","衝突","打架","鬥毆","拉扯","揮拳","全武行","械鬥","動手","打臉","口角","警方"], label: "衝突" },
  "配息":     { words: ["配息","股利","除息","殖利率","股息"], label: "配息" },
  "財報":     { words: ["獲利","EPS","淨利","法說","財報","營收"], label: "財報" },
  "法人籌碼": { words: ["外資","買超","賣超","投信","自營商","籌碼","大戶"], label: "法人籌碼" },
  "重大訊息": { words: ["重訊","子公司","處分","取得","公告","董事會決議"], label: "重大訊息" },
};
function normalizeTitle(t){
  return t
    .replace(/[（(][^)）]*[)）]/g,'')
    .replace(/[【\[][^\]】]*[\]】]/g,'')
    .replace(/[─–—\-・•·。，,！!？?　\s]+/g,' ')
    .replace(/[^a-zA-Z0-9\u4e00-\u9fff ]/g,'')
    .trim();
}
function eventCategories(title){
  const cats = [];
  for(const [cat, info] of Object.entries(EVENT_DICT)){
    for(const w of info.words){ if(title.includes(w)){ cats.push(cat); break; } }
  }
  return cats;
}
function findContextWords(titles){
  const ctx = [];
  const contextChecks = [
    { words:["高層"], label:"高層" },
    { words:["董座","董事長"], label:"董座" },
    { words:["警方","警察","警員"], label:"警方到場" },
    { words:["股東會","股東大會","股臨會"], label:"股東會" },
  ];
  for(const c of contextChecks){
    for(const t of titles){
      for(const w of c.words){ if(t.includes(w)){ ctx.push(c.label); break; } }
      if(ctx[ctx.length-1] === c.label) break;
    }
  }
  return ctx;
}
function eventLabel(rows){
  const cats = rows.map(r=>eventCategories(r.title)).flat();
  const freq = {};
  for(const c of cats) freq[c] = (freq[c]||0) + 1;
  let bestCat="", bestCount=0;
  for(const [c,n] of Object.entries(freq)){ if(n>bestCount){ bestCount=n; bestCat=c; } }
  if(bestCat){
    const name = TICKER_NAMES[rows[0].ticker] || rows[0].ticker;
    const titles = rows.map(r=>r.title);
    const ctx = findContextWords(titles);
    const ctxStr = ctx.length > 0 ? ctx.join("") : "";
    return name + ctxStr + EVENT_DICT[bestCat].label;
  }
  // fallback: find shortest meaningful title segment
  let shortest = rows[0].title;
  for(const r of rows){
    if(r.title.length < shortest.length) shortest = r.title;
  }
  return shortest.length > 24 ? shortest.substring(0,24)+"…" : shortest;
}
function ngrams(s, n){
  const r = [];
  for(let i=0;i<=s.length-n;i++) r.push(s.substring(i,i+n));
  return r;
}
function jaccard(a,b){
  const sa=new Set(a), sb=new Set(b);
  let inter=0;
  for(const x of sa) if(sb.has(x)) inter++;
  const union = new Set([...sa,...sb]).size;
  return union===0 ? 0 : inter/union;
}
function entityFromTitle(title, ticker){
  // Extract entity names that appear in a title, using known ticker names
  const entities = [];
  const name = TICKER_NAMES[ticker];
  if(name && title.includes(name)) entities.push(name);
  // Also check for partial matches like "國泰" from "國泰金"
  for(const [tk, nm] of Object.entries(TICKER_NAMES)){
    if(nm.length>1 && title.includes(nm)) entities.push(nm);
  }
  return entities;
}
function groupByEvent(rows){
  if(rows.length<=1) return [{eventRows:rows, eventLabel:eventLabel(rows)}];
  const n=rows.length, assigned=Array(n).fill(false), clusters=[];
  // Pass 1: same ticker + shared event category
  for(let i=0;i<n;i++){
    if(assigned[i]) continue;
    const group=[rows[i]]; assigned[i]=true;
    const ci=eventCategories(rows[i].title), ti=rows[i].ticker;
    for(let j=i+1;j<n;j++){
      if(assigned[j]) continue;
      const cj=eventCategories(rows[j].title);
      if(ti===rows[j].ticker && ci.length>0 && cj.length>0 && ci.some(c=>cj.includes(c))){
        group.push(rows[j]); assigned[j]=true;
      }
    }
    clusters.push({eventRows:group, eventLabel:eventLabel(group)});
  }
  // Pass 2: cross-ticker — same event category + entity name in title
  for(let i=0;i<clusters.length;i++){
    if(clusters[i].eventRows.length>1) continue; // already merged
    const a = clusters[i].eventRows[0];
    const ci = eventCategories(a.title);
    if(ci.length===0) continue;
    const ai = entityFromTitle(a.title, a.ticker);
    if(ai.length===0) continue;
    for(let k=0;k<clusters.length;k++){
      if(k===i || clusters[k].eventRows.length===0) continue;
      const bi = clusters[k].eventRows.some(br => {
        const bc = eventCategories(br.title);
        if(!bc.some(c=>ci.includes(c))) return false;
        const be = entityFromTitle(br.title, br.ticker);
        return be.some(e=>ai.includes(e));
      });
      if(bi){
        for(const br of clusters[k].eventRows) clusters[i].eventRows.push(br);
        clusters[k].eventRows = [];
        break;
      }
    }
  }
  // Pass 3: n-gram Jaccard for remaining singletons — merge with any multi-row cluster
  for(let i=0;i<clusters.length;i++){
    if(clusters[i].eventRows.length>1) continue;
    const a = clusters[i].eventRows[0];
    const normA = normalizeTitle(a.title);
    let merged = false;
    for(let k=0;k<clusters.length && !merged;k++){
      if(k===i || clusters[k].eventRows.length<2) continue;
      for(const bRow of clusters[k].eventRows){
        const normB = normalizeTitle(bRow.title);
        const sim2 = jaccard(ngrams(normA,2), ngrams(normB,2));
        const sim3 = jaccard(ngrams(normA,3), ngrams(normB,3));
        if((sim2>0.4 && sim3>0.2) || sim3>0.35){
          clusters[k].eventRows.push(a);
          clusters[i].eventRows = [];
          merged = true;
          break;
        }
      }
    }
  }
  return clusters.filter(c=>c.eventRows.length>0);
}
function groupByOverlayWithFallback(rows){
  // 先按 overlay event_key 分組
  const hasEvent = rows.filter(r=>r.event_key);
  const noEvent = rows.filter(r=>!r.event_key);
  const result = [];
  if(hasEvent.length > 0){
    const byKey = {};
    for(const r of hasEvent){
      const k = r.event_key;
      if(!byKey[k]) byKey[k] = {eventLabel: r.event_label || k, eventRows: [], eventKey: k};
      byKey[k].eventRows.push(r);
    }
    for(const [k, g] of Object.entries(byKey)){
      result.push({eventRows: g.eventRows, eventLabel: g.eventLabel, _overlay: true});
    }
  }
  // 無 overlay 的 row 走 deterministic groupByEvent
  if(noEvent.length > 0){
    const fallback = groupByEvent(noEvent);
    result.push(...fallback);
  }
  return result;
}
function rowHTML(r){
  const meta = [tickerBadge(r.ticker), `<span>${esc(r.source)}</span>`];
  if(r.time) meta.push(`<span class="sep">·</span><span>${esc(r.time)}</span>`);
  meta.push(`<span class="chip">${esc(r.theme)}</span>`);
  return `<article class="row ${r.read?"":"unread"} ${r.starred?"starred":""}" role="button" tabindex="0" data-id="${r.id}">
    <div class="r-main">
      <div class="title">${esc(r.title)}</div>
      <div class="meta">${meta.join("")}</div>
    </div>
    <button class="star" data-star="${r.id}" aria-label="收藏" title="收藏">${ICONS.star}</button>
  </article>`;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 主渲染 ──
function render(){
  if(state.loading) return;
  const wrap = document.getElementById("groups");
  const empty = document.getElementById("empty");
  const items = DATA.filter(matches);

  if(items.length===0){
    wrap.innerHTML = "";
    let mk="✓", big="今天的新聞都看完了", small="明早 07:30 會有新的一批";
    if(state.search){ mk="⌕"; big=`找不到符合「${state.search}」的新聞`; small="換個關鍵字試試"; }
    else if(state.view==="starred"){ mk="☆"; big="還沒有收藏"; small="點任一則右側的星號加入"; }
    empty.innerHTML = `<div class="mk">${mk}</div><div class="big">${big}</div><div class="small">${small}</div>`;
    empty.classList.add("show");
    return;
  }
  empty.classList.remove("show");

  if(state.sort==="ticker"){
    const order = TICKERS.map(t=>t.ticker);
    wrap.innerHTML = order.filter(tk=>items.some(i=>i.ticker===tk)).map(tk=>{
      const rows = items.filter(i=>i.ticker===tk).sort((a,b)=>b.ts-a.ts);
      const unread = rows.filter(r=>!r.read).length;
      const nm = TICKER_NAMES[tk] || tk;
      return `<section class="group topic-cluster ticker-cluster collapsed" style="${tickerStyle(tk)}">
        <div class="topic-head" onclick="this.parentElement.classList.toggle('collapsed')">
          <span class="toggle">▼</span>
          <span class="topic-label"><span class="rtk-name">${esc(nm)}</span><span class="rtk-code">${esc(tk)}</span></span>
          <span class="topic-meta">${unread}/${rows.length} 則</span>
        </div>
        ${rows.map(rowHTML).join("")}
      </section>`;
    }).join("");
  } else {
    // 依時間排序：按日期分組 → 日期內按主題聚類
    const sorted = [...items].sort((a,b)=>b.ts-a.ts);
    const weekMap = ["日","一","二","三","四","五","六"];
    const dateLabel = (ts) => {
      const d = new Date(ts);
      return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}(${weekMap[d.getDay()]})`;
    };
    // 日期分組
    const dateGroups = [];
    let curDate = "";
    for(const r of sorted){
      const lbl = dateLabel(r.ts);
      if(lbl !== curDate){ curDate = lbl; dateGroups.push({label:lbl, rows:[]}); }
      dateGroups[dateGroups.length-1].rows.push(r);
    }
    // 每個日期內做主題聚類（科技新聞跳過聚類，直接列出）
    wrap.innerHTML = dateGroups.map(dg => {
      const clusters = state.category === "tech" 
        ? dg.rows.map(r => ({ticker:r.ticker, topic:"", rows:[r], tickerString:""}))  // 科技新聞不聚類
        : groupByTheme(dg.rows);
      const clusterHTML = clusters.map(cl => {
        if(cl.rows.length === 1){
          return rowHTML(cl.rows[0]);
        }
        // 多篇同主題 → 內部再做事件分群
        const eventClusters = groupByOverlayWithFallback(cl.rows);
        const eventHTML = eventClusters.map(ec => {
          if(ec.eventRows.length === 1) return rowHTML(ec.eventRows[0]);
          const unread = ec.eventRows.filter(r=>!r.read).length;
          return `<div class="topic-cluster collapsed">
            <div class="topic-head" onclick="this.parentElement.classList.toggle('collapsed')">
              <span class="toggle">▼</span>
              <span class="topic-label">${esc(ec.eventLabel)}</span>
              <span class="topic-meta">${unread}/${ec.eventRows.length} 則</span>
            </div>
            ${ec.eventRows.map(rowHTML).join("")}
          </div>`;
        }).join("");
        const unread = cl.rows.filter(r=>!r.read).length;
        return `<div class="topic-cluster">
          <div class="topic-head" onclick="this.parentElement.classList.toggle('collapsed')">
            <span class="toggle">▼</span>
            <span class="topic-label">${esc(cl.topic)}</span>
            <span class="topic-meta">${cl.tickerString || ''} · ${unread}/${cl.rows.length} 則</span>
          </div>
          ${eventHTML}
        </div>`;
      }).join("");
      return `<section class="group">
        <div class="group-head"><span class="gnm">${dg.label}</span><span class="gline"></span><span class="gcount">${dg.rows.length} 則</span></div>
        ${clusterHTML}
      </section>`;
    }).join("");
  }
}

function renderAll(){
  renderRail();
  render();
  updateCounts();
}

// ── Supabase 寫入操作（樂觀更新） ──
async function setRead(id, value){
  const r = DATA.find(d=>String(d.id)===String(id));
  if(!r) return;
  r.read = value;
  persistReadState();
  renderAll();

  const { error } = await supabase.from("news").update({ read: value }).eq("id", id);
  if(error){
    // localStorage 是使用者端權威備援；DB 寫入失敗時不可回滾 UI，否則切換頁面會變回未讀。
    console.warn("setRead persisted locally; Supabase update failed:", error);
  }
}

async function setStarred(id, value){
  const r = DATA.find(d=>String(d.id)===String(id));
  if(!r) return;
  r.starred = value;
  persistStarredState();
  renderAll();

  const { error } = await supabase.from("news").update({ starred: value }).eq("id", id);
  if(error){
    console.warn("setStarred persisted locally; Supabase update failed:", error);
  }
}

async function markAllRead(){
  const ids = DATA.filter(matches).map(r=>r.id);
  if(!ids.length) return;

  ids.forEach(id=>{ const r=DATA.find(d=>String(d.id)===String(id)); if(r) r.read=true; });
  persistReadState();
  renderAll();

  const { error } = await supabase.from("news").update({ read: true }).in("id", ids);
  if(error){
    // 保留本地已讀狀態，避免切換分類/重新載入時回到未讀。
    console.warn("markAllRead persisted locally; Supabase update failed:", error);
  }
}

// ── 互動處理 ──
function openRow(el){
  const r = DATA.find(d=>d.id===+el.dataset.id);
  if(!r) return;
  window.open(r.url, "_blank");
  if(r.read) return;
  setRead(r.id, true);
}

function toggleStar(id){
  const r = DATA.find(d=>d.id===id);
  if(!r) return;
  setStarred(id, !r.starred);
}

function updateCounts(){
  renderRail();
  document.getElementById("cnt-unread").textContent = totalUnread();
  document.getElementById("cnt-star").textContent  = totalStar();
}

function selectTicker(tk){ state.ticker = tk; renderAll(); }

document.getElementById("groups").addEventListener("keydown", e=>{
  const row = e.target.closest(".row");
  if(row && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); openRow(row); }
});
document.addEventListener("click", e=>{
  const w = e.target.closest("[data-ticker]");
  if(w) selectTicker(w.dataset.ticker);
});
document.getElementById("viewSeg").querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{ state.view=b.dataset.view; b.parentElement.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b)); renderAll(); };
});
document.getElementById("sortSeg").querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{ state.sort=b.dataset.sort; b.parentElement.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b)); renderAll(); };
});
// 類別切換
document.querySelectorAll(".cat-tab").forEach(b=>{
  b.onclick = ()=>{
    state.category = b.dataset.cat;
    state.ticker = "all";
    document.querySelectorAll(".cat-tab").forEach(x=>x.classList.toggle("active",x===b));
    fetchNews();
  };
});
document.getElementById("search").addEventListener("input", e=>{ state.search=e.target.value.trim().toLowerCase(); renderAll(); });
document.getElementById("markAll").onclick = markAllRead;
document.getElementById("retryBtn").onclick = fetchNews;

const themeBtn = document.getElementById("themeBtn");
function setThemeIcon(){ themeBtn.innerHTML = document.documentElement.dataset.theme==="dark" ? ICONS.sun : ICONS.moon; }
themeBtn.onclick = ()=>{
  if(document.documentElement.dataset.theme==="dark") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.dataset.theme="dark";
  setThemeIcon();
};

// ── 啟動 ──
setThemeIcon();
fetchNews();
</script>
</body>
</html>
