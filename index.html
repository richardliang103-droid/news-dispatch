<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>晨報 · 個人股市新聞</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Noto+Sans+TC:wght@400;500&family=Noto+Serif+TC:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{ /* light (default) — warm paper */
  --bg:#FBFAF6; --surface:#FFFFFF; --hover:#F3F0E9;
  --border:#E7E2D8; --hair:#EEEAE1;
  --ink:#211C16; --muted:#79716A; --dim:#ABA39A;
  --signal:#B8860B; --signal-soft:rgba(184,134,11,.13); --signal-line:rgba(184,134,11,.9);
  --ticker-bg:rgba(29,78,216,.10); --ticker-name:#1D4ED8; --ticker-code:#7C2D12;
  --serif:"Newsreader","Noto Serif TC",Georgia,"Times New Roman",serif;
  --sans:-apple-system,system-ui,"Segoe UI","Noto Sans TC",sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --head-h:64px;
}
html[data-theme="dark"]{ /* warm lamplit dark */
  --bg:#16130E; --surface:#1E1A14; --hover:#25201A;
  --border:#2C261E; --hair:#231E17;
  --ink:#ECE6DC; --muted:#9A9085; --dim:#5F574C;
  --signal:#E3A008; --signal-soft:rgba(227,160,8,.13); --signal-line:rgba(227,160,8,.92);
  --ticker-bg:rgba(96,165,250,.14); --ticker-name:#93C5FD; --ticker-code:#FDBA74;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background .3s,color .3s}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
::selection{background:var(--signal-soft)}
.rail::-webkit-scrollbar,.feed::-webkit-scrollbar{width:11px}
.rail::-webkit-scrollbar-thumb,.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:3px solid var(--bg)}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:256px 1fr;height:100dvh;overflow:hidden}
.rail{border-right:1px solid var(--border);padding:20px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:24px}
.feed{overflow-y:auto;position:relative}
.chipbar{display:none}

/* ---------- rail ---------- */
.brand{display:flex;align-items:baseline;gap:8px;padding:0 8px}
.brand .mark{color:var(--signal);font-size:17px;position:relative;top:1px}
.brand .name{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:.01em}
.brand .sub{margin-left:2px;font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim)}
.rail-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:0 8px;margin-bottom:9px}
.watchlist{display:flex;flex-direction:column;gap:1px}
.wl-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px;border-radius:8px;color:var(--muted);transition:background .15s,color .15s}
.wl-item:hover{background:var(--hover)}
.wl-item.active{background:var(--hover);color:var(--ink)}
.wl-item .tk{font-family:var(--mono);font-weight:500;font-size:13px;letter-spacing:.02em;color:var(--ink)}
.wl-item.all .tk{font-family:var(--sans)}
.wl-item .nm{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-item .badge{margin-left:auto;min-width:21px;height:18px;padding:0 6px;border-radius:9px;background:var(--signal-soft);color:var(--signal);font-family:var(--mono);font-size:11px;font-weight:500;display:inline-flex;align-items:center;justify-content:center}
.wl-item .badge.zero{background:transparent;color:var(--dim)}
.date-nav{display:flex;flex-direction:column;gap:1px}
.date{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:8px;color:var(--muted);font-size:13px;transition:background .15s,color .15s}
.date:hover{background:var(--hover)}
.date.active{color:var(--ink)}
.date .when{font-family:var(--mono);font-size:11px;color:var(--dim)}
.rail-foot{margin-top:auto;display:flex;align-items:center;gap:8px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.02em}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pulse 2.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,134,11,.4)}70%{box-shadow:0 0 0 6px rgba(184,134,11,0)}100%{box-shadow:0 0 0 0 rgba(184,134,11,0)}}

/* ---------- feed top (sticky head + toolbar) ---------- */
.feed-top{position:sticky;top:0;z-index:6;background:var(--bg);border-bottom:1px solid var(--border)}
.feed-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 22px;height:var(--head-h)}
.h-left{display:flex;align-items:baseline;gap:10px}
.h-left h1{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.01em}
.h-left .date-sub{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.02em}
.icon-btn{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid var(--border);transition:background .15s,color .15s}
.icon-btn:hover{background:var(--hover);color:var(--ink)}
.icon-btn svg{width:16px;height:16px}
.toolbar{display:flex;align-items:center;gap:10px;padding:0 22px 14px;flex-wrap:wrap}
.search{flex:1 1 200px;position:relative;min-width:160px}
.search svg{width:15px;height:15px;position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim)}
.search input{width:100%;padding:8px 12px 8px 32px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--ink);font-size:13px}
.search input::placeholder{color:var(--dim)}
.search input:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-soft)}
.tools{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:2px}
.seg button{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;font-size:12.5px;color:var(--muted);transition:background .15s,color .15s;white-space:nowrap}
.seg button.active{background:var(--hover);color:var(--ink)}
.seg button .cnt{font-family:var(--mono);font-size:10.5px;color:var(--signal)}
.seg button:not(.active) .cnt{color:var(--dim)}
.markall{font-size:12.5px;color:var(--muted);padding:6px 8px;border-radius:8px;transition:background .15s,color .15s;white-space:nowrap}
.markall:hover{background:var(--hover);color:var(--ink)}

/* ---------- category tabs ---------- */
.cat-tabs{display:flex;gap:0;padding:8px 22px 0;border-bottom:1px solid var(--border)}
.cat-tab{padding:8px 18px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;cursor:pointer}
.cat-tab:hover{color:var(--ink)}
.cat-tab.active{color:var(--ink);border-bottom-color:var(--signal)}

/* ---------- 新版：AI 事件摘要 ---------- */
.topic-summary{font-family:var(--sans);font-size:12px;color:var(--signal);font-weight:400;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:6px;opacity:.85}
.topic-cluster.collapsed .topic-summary{opacity:.65}

/* ---------- skeleton ---------- */
.skeleton{background:linear-gradient(90deg,var(--hair) 25%,var(--border) 50%,var(--hair) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-row{display:flex;align-items:center;gap:12px;padding:16px 22px}
.sk-title{height:20px;flex:1}
.sk-meta{height:14px;width:180px}

/* ---------- groups & rows ---------- */
.groups{padding:10px 14px 70px}
.group{margin-top:16px}
.group-head{display:flex;align-items:baseline;gap:10px;padding:6px 10px 10px}
.group-head .gtk{font-family:var(--mono);font-weight:500;font-size:13px;letter-spacing:.03em;color:var(--ink)}
.group-head .gnm{font-size:12.5px;color:var(--muted)}
.group-head .gline{flex:1;height:1px;align-self:center;background:var(--hair)}
.group-head .gcount{font-family:var(--mono);font-size:11px;color:var(--dim)}
.row{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;padding:13px 12px 13px 16px;border-radius:11px;border-left:2px solid transparent;transition:background .15s,border-color .3s ease}
.row:hover{background:var(--hover)}
.row:focus-visible{outline:2px solid var(--signal);outline-offset:-2px}
.row.unread{border-left-color:var(--signal-line)}
.r-main{flex:1;min-width:0;cursor:pointer}
.row .title{font-family:var(--serif);font-size:17px;line-height:1.42;font-weight:500;color:var(--dim);letter-spacing:.004em;transition:color .3s ease}
.row.unread .title{color:var(--ink);font-weight:600}
.row .meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:6px;font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:.01em}
.row.unread .meta{color:var(--muted)}
.row .rtk{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;background:var(--ticker-bg);border:1px solid color-mix(in srgb, var(--ticker-name) 22%, transparent);font-weight:600;letter-spacing:.02em}
.row .rtk .rtk-name{color:var(--ticker-name);font-family:var(--sans);font-weight:700}
.row .rtk .rtk-code{color:var(--ticker-code);font-family:var(--mono);font-weight:600;font-size:10.5px}
.row .meta .sep{opacity:.5}
/* ── topic cluster ── */
.topic-cluster{margin:6px 0 2px;padding:4px 0;border-left:2px solid var(--hair);padding-left:10px}
.topic-cluster .topic-head{display:flex;align-items:baseline;gap:8px;padding:4px 0 6px;font-size:12px;cursor:pointer;user-select:none;border-radius:6px;transition:background .12s}
.topic-cluster .topic-head:hover{background:var(--hover)}
.topic-cluster .topic-head .toggle{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:12px;transition:transform .2s}
.topic-cluster.collapsed .topic-head .toggle{transform:rotate(-90deg)}
.topic-cluster.collapsed > .row,
.topic-cluster.collapsed > .topic-cluster{display:none}
.topic-cluster .topic-label{color:var(--ink);font-weight:500;font-family:var(--sans)}
.topic-cluster .topic-meta{color:var(--dim);font-family:var(--mono);font-size:10.5px;margin-left:auto}
.ticker-cluster{border-left-color:color-mix(in srgb, var(--ticker-name) 35%, var(--hair));padding-left:10px}
.ticker-cluster .topic-head{padding:8px 4px 9px}
.ticker-cluster .topic-label{display:inline-flex;align-items:baseline;gap:5px}
.ticker-cluster .topic-label .rtk-name{color:var(--ticker-name);font-weight:700}
.ticker-cluster .topic-label .rtk-code{color:var(--ticker-code);font-family:var(--mono);font-size:11px}
/* ── chip ── */
.star{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:background .15s,color .15s,transform .15s}
.star:hover{background:var(--hover);color:var(--signal)}
.star svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.3}
.row.starred .star{color:var(--signal)}
.row.starred .star svg{fill:var(--signal);stroke:none}
.star.spin svg{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}

/* ---------- empty ---------- */
.empty{display:none;flex-direction:column;align-items:center;justify-content:center;gap:7px;text-align:center;padding:100px 20px;min-height:340px}
.empty.show{display:flex}
.empty .mk{width:42px;height:42px;border-radius:50%;background:var(--signal-soft);color:var(--signal);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:6px}
.empty .big{font-family:var(--serif);font-size:18px;color:var(--ink)}
.empty .small{font-family:var(--mono);font-size:12px;color:var(--dim)}

/* ---------- err banner ---------- */
.err-banner{display:none;align-items:center;gap:8px;padding:8px 16px;margin:10px 22px;background:#FFF0F0;border:1px solid #FCC;border-radius:9px;font-size:12.5px;color:#C44}
html[data-theme="dark"] .err-banner{background:#2A1010;border-color:#633;color:#F88}
.err-banner.show{display:flex}
.err-banner .retry{font-family:var(--mono);margin-left:auto;color:var(--signal);cursor:pointer;font-size:11px}

/* ---------- mobile ---------- */
@media (max-width:860px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .rail{display:none}
  .chipbar{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg)}
  .chipbar::-webkit-scrollbar{display:none}
  .chip-tk{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;border:1px solid var(--border);color:var(--muted);font-size:13px;white-space:nowrap}
  .chip-tk.active{background:var(--hover);color:var(--ink);border-color:transparent}
  .chip-tk.all{font-family:var(--sans)}
  .chip-tk .tk{font-family:var(--sans);font-weight:600;color:var(--ink)}
  .chip-tk .code{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-left:-2px}
  .chip-tk.all .code{display:none}
  .chip-tk .badge{min-width:18px;height:16px;padding:0 5px;border-radius:8px;background:var(--signal-soft);color:var(--signal);font-family:var(--mono);font-size:10.5px;display:inline-flex;align-items:center;justify-content:center}
  .feed-head{padding:0 16px;height:56px}
  .h-left h1{font-size:19px}
  .toolbar{padding:0 16px 12px}
  .groups{padding:8px 8px 56px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<!-- CDN dependencies (Supabase UMD，Fuse.js ESM 由下方 <script type="module"> 動態載入) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="app">
  <!-- left rail / watchlist -->
  <aside class="rail">
    <div class="brand"><span class="mark">◆</span><span class="name">晨報</span><span class="sub">DISPATCH</span></div>
    <div>
      <div class="rail-label">追蹤標的</div>
      <nav class="watchlist" id="watchlist"></nav>
    </div>
    <div>
      <div class="rail-label">日期</div>
      <div class="date-nav">
        <button class="date active"><span>今日</span><span class="when" id="date-when"></span></button>
      </div>
    </div>
    <div class="rail-foot"><span class="pulse"></span><span id="update-time">載入中…</span></div>
  </aside>

  <!-- mobile ticker chips -->
  <div class="chipbar" id="chipbar"></div>

  <!-- main feed -->
  <main class="feed">
    <div class="feed-top">
      <div class="feed-head">
        <div class="h-left"><h1>晨報</h1><span class="date-sub" id="date-sub"></span></div>
        <button class="icon-btn" id="themeBtn" title="切換深淺色" aria-label="切換深淺色"></button>
      </div>
      <div class="cat-tabs">
        <button class="cat-tab active" data-cat="stock">📈 股市</button>
        <button class="cat-tab" data-cat="tech">💻 科技</button>
      </div>
      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="search" placeholder="搜尋標題、來源…" autocomplete="off">
        </div>
        <div class="tools">
          <div class="seg" id="viewSeg">
            <button data-view="all" class="active">全部</button>
            <button data-view="unread">未讀 <span class="cnt" id="cnt-unread">…</span></button>
            <button data-view="starred">收藏 <span class="cnt" id="cnt-star">…</span></button>
          </div>
          <div class="seg" id="sortSeg">
            <button data-sort="ticker">標的</button>
            <button data-sort="time" class="active">時間</button>
          </div>
          <button class="markall" id="markAll">全部已讀</button>
        </div>
      </div>
    </div>
    <div class="err-banner" id="errBanner"><span>⚠ 載入失敗</span><button class="retry" id="retryBtn">重試</button></div>
    <div class="groups" id="groups"></div>
    <div class="empty" id="empty"></div>
  </main>
</div>

<!-- ES Module 入口 — Fuse.js 作為全域暴露，Supabase 作為 UMD -->
<script type="module">
  // Fuse.js 的 ESM 模組不會自動掛到 window，手動掛載供 ui.js 使用
  import Fuse from "https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.mjs";
  window.Fuse = Fuse;
  // 載入主應用模組
  import("./js/ui.js");
</script>
</body>
</html>
